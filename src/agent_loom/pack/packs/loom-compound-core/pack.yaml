id: loom-compound-core
version: "0.1.0"
description: "Loom Compound Core: OpenCode compound scaffold + baseline Loom docs"
install_roots:
  - .opencode
  - .loom/compound
  - LOOM.md
  - AGENTS.md
managed_globs:
  - ".opencode/agents/**"
  - ".opencode/commands/**"
  - ".opencode/compound/**"
  - ".opencode/plugins/**"
  - ".opencode/types/**"
  - ".opencode/.gitignore"
  - ".opencode/README.md"
  - ".opencode/tsconfig.json"
scaffold_globs:
  - "AGENTS.md"
  - "LOOM.md"
  - ".loom/compound/**"
  - ".opencode/memory/.gitignore"
  - ".opencode/skills/skill-authoring/**"
protected_globs:
  - ".git/**"
  - ".gitignore"
