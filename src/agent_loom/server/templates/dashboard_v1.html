<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Loom // Console</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* --- ATOM ONE DARK THEME VARIABLES --- */
    :root {
      /* Backgrounds */
      --bg-app: #282c34;       /* Main editor background */
      --bg-panel: #21252b;     /* Sidebar/Panel background */
      --bg-active: #2c313a;    /* Active list item/hover */
      --bg-overlay: rgba(33, 37, 43, 0.85); /* Glassmorphism base */

      /* Borders */
      --border: #181a1f;       /* Dark splitters */
      --border-light: #3e4451; /* Subtle separators */

      /* Syntax / Accents */
      --fg-primary: #abb2bf;   /* Main Text */
      --fg-subtle: #5c6370;    /* Comments/Ignored */

      --accent-blue: #61afef;  /* Functions/Info */
      --accent-purple: #c678dd;/* Keywords */
      --accent-cyan: #56b6c2;  /* Operators */
      --accent-green: #98c379; /* Strings/Success */
      --accent-red: #e06c75;   /* Errors/Deletions */
      --accent-amber: #d19a66; /* Warnings/Classes */

      /* Layout */
      --sidebar-w: 260px;
      --header-h: 48px;
      --font-ui: "Inter", sans-serif;
      --font-code: "JetBrains Mono", monospace;
      --radius: 6px;
    }

    /* --- RESET & BASE --- */
    * { box-sizing: border-box; outline: none; }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg-app);
      color: var(--fg-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      height: 100vh;
      width: 100vw;
      overflow: hidden; /* App-like: Body never scrolls */
      user-select: none; /* UI feel */
    }

    /* Scrollbars (Atom Style) */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3e4451; border: 3px solid transparent; background-clip: content-box; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #5c6370; }

    /* --- LAYOUT GRID --- */
    .app-layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: var(--header-h) 1fr;
      height: 100%;
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      -webkit-app-region: drag; /* If wrapped in Electron */
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }

    /* Main Stage */
    .stage {
      background: var(--bg-app);
      position: relative;
      overflow: hidden; /* Views handle their own scroll */
      display: flex;
      flex-direction: column;
    }

    /* --- UI PRIMITIVES --- */

    /* Typography & Code */
    .mono { font-family: var(--font-code); }
    .text-sm { font-size: 12px; }
    .text-xs { font-size: 11px; }
    .text-muted { color: var(--fg-subtle); }
    .text-blue { color: var(--accent-blue); }
    .text-green { color: var(--accent-green); }
    .text-red { color: var(--accent-red); }
    .text-amber { color: var(--accent-amber); }
    .text-purple { color: var(--accent-purple); }

    /* Buttons (Flat/IDE style) */
    .btn {
      background: transparent;
      color: var(--fg-primary);
      border: 1px solid transparent;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.1s;
    }
    .btn:hover { background: var(--bg-active); }
    .btn:active { background: var(--border-light); transform: translateY(1px); }
    .btn.primary { background: var(--accent-blue); color: var(--bg-app); font-weight: 600; }
    .btn.primary:hover { filter: brightness(1.1); }
    .btn.icon { padding: 4px; aspect-ratio: 1; }

    /* Inputs */
    .input {
      background: var(--bg-app);
      border: 1px solid var(--border-light);
      color: var(--fg-primary);
      padding: 6px 8px;
      border-radius: 4px;
      font-family: var(--font-ui);
      font-size: 12px;
      width: 100%;
    }
    .input:focus { border-color: var(--accent-blue); }

    /* Badges */
    .badge {
      padding: 2px 6px; border-radius: 4px;
      font-size: 10px; font-weight: 600; font-family: var(--font-code);
      text-transform: uppercase;
    }
    .badge.outline { border: 1px solid var(--border-light); color: var(--fg-subtle); }
    .badge.blue { background: rgba(97, 175, 239, 0.15); color: var(--accent-blue); border: 1px solid rgba(97, 175, 239, 0.3); }
    .badge.green { background: rgba(152, 195, 121, 0.15); color: var(--accent-green); border: 1px solid rgba(152, 195, 121, 0.3); }
    .badge.red { background: rgba(224, 108, 117, 0.15); color: var(--accent-red); border: 1px solid rgba(224, 108, 117, 0.3); }
    .badge.amber { background: rgba(209, 154, 102, 0.15); color: var(--accent-amber); border: 1px solid rgba(209, 154, 102, 0.3); }

    /* --- COMPONENTS --- */

    /* Sidebar Nav Items */
    .nav-item {
      padding: 8px 16px;
      display: flex; align-items: center; gap: 10px;
      color: var(--fg-subtle);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.1s;
    }
    .nav-item:hover { color: var(--fg-primary); background: var(--bg-active); }
    .nav-item.active { color: var(--fg-primary); background: var(--bg-active); border-left-color: var(--accent-blue); }
    .nav-section {
      padding: 16px 16px 8px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--fg-subtle);
    }

    /* Command Palette (Spotlight style) */
    .cmd-overlay {
      position: fixed; inset: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: flex; justify-content: center; padding-top: 10vh;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    .cmd-overlay.open { opacity: 1; pointer-events: auto; }
    .cmd-box {
      width: 600px; max-width: 90vw;
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      display: flex; flex-direction: column;
      overflow: hidden;
      transform: scale(0.98); transition: transform 0.15s;
    }
    .cmd-overlay.open .cmd-box { transform: scale(1); }
    .cmd-input {
      width: 100%; padding: 16px;
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      font-size: 16px; color: var(--fg-primary); font-family: var(--font-ui);
    }
    .cmd-list { max-height: 300px; overflow-y: auto; padding: 8px; }
    .cmd-item {
      padding: 8px 12px; border-radius: 4px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; color: var(--fg-subtle);
    }
    .cmd-item:hover, .cmd-item.selected { background: var(--accent-blue); color: #fff; }
    .cmd-item.selected .badge { border-color: rgba(255,255,255,0.5); color: #fff; }

    /* Split Views (Master-Detail) */
    .split-view { display: flex; height: 100%; overflow: hidden; }
    .split-master {
      width: 350px; background: var(--bg-panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .split-detail { flex: 1; overflow-y: auto; background: var(--bg-app); display: flex; flex-direction: column; }

    /* List Items */
    .list-item {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; display: flex; flex-direction: column; gap: 4px;
    }
    .list-item:hover { background: var(--bg-active); }
    .list-item.active { background: #2c313a; border-left: 3px solid var(--accent-blue); padding-left: 13px; }
    .list-title { font-weight: 500; color: var(--fg-primary); }
    .list-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--fg-subtle); }

    /* Code/Data Views */
    pre { margin: 0; }
    .code-block {
      background: #1e2127; /* Slightly darker */
      padding: 16px; border-radius: 4px;
      font-family: var(--font-code); font-size: 12px; line-height: 1.5;
      overflow-x: auto; color: var(--fg-primary);
      border: 1px solid var(--border);
    }
    .kv-grid {
      display: grid; grid-template-columns: auto 1fr; gap: 8px 24px;
      font-family: var(--font-code); font-size: 12px;
    }
    .kv-key { color: var(--accent-purple); }
    .kv-val { color: var(--accent-green); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
    .tab {
      padding: 10px 20px; font-size: 12px; cursor: pointer; color: var(--fg-subtle); border-right: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .tab:hover { color: var(--fg-primary); background: var(--bg-active); }
    .tab.active { background: var(--bg-app); color: var(--accent-blue); border-top: 2px solid var(--accent-blue); margin-top: -2px; }

    /* Status Bar (Footer-like but dynamic) */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-subtle); transition: background 0.3s; }
    .status-dot.ok { background: var(--accent-green); box-shadow: 0 0 8px rgba(152, 195, 121, 0.4); }
    .status-dot.err { background: var(--accent-red); }

    /* Utilities */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .p-4 { padding: 16px; }
    .grow { flex: 1; }
    .h-full { height: 100%; }
    .overflow-auto { overflow: auto; }
    .hidden { display: none !important; }

    /* Animations */
    @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: 0; } }
    .anim-in { animation: slideIn 0.2s ease-out; }

  </style>
</head>
<body>

<div class="app-layout">
  <header class="header">
    <div class="flex items-center gap-4">
      <div class="mono font-bold text-blue">LOOM<span style="color:var(--fg-primary)">//</span>CONSOLE</div>
      <div class="text-xs text-muted" id="breadcrumbs">Workspace / Overview</div>
    </div>

    <div class="flex items-center gap-2">
      <div class="text-xs text-muted mono" style="margin-right: 12px;">Cmd+K to search</div>
      <button class="btn icon" onclick="actions.refresh()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></button>
      <button class="btn primary" onclick="actions.newTicket()">+ Ticket</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="nav-section">Platform</div>
    <div class="nav-item active" onclick="router.go('overview')" id="nav-overview">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      Overview
    </div>
    <div class="nav-item" onclick="router.go('tickets')" id="nav-tickets">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      Tickets
    </div>
    <div class="nav-item" onclick="router.go('teams')" id="nav-teams">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      Teams
    </div>

    <div class="nav-section">Intelligence</div>
    <div class="nav-item" onclick="router.go('memory')" id="nav-memory">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      Memory
    </div>
    <div class="nav-item" onclick="router.go('introspect')" id="nav-introspect">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
      Introspect
    </div>

    <div class="nav-section">System</div>
    <div class="nav-item" onclick="router.go('workspace')" id="nav-workspace">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
      Workspace
    </div>
    <div class="nav-item" onclick="router.go('settings')" id="nav-settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      Settings
    </div>

    <div style="margin-top: auto; padding: 12px; border-top: 1px solid var(--border);">
      <div class="flex items-center gap-2 text-xs text-muted">
        <div class="status-dot" id="conn-status"></div>
        <span id="conn-text">Connecting...</span>
      </div>
    </div>
  </aside>

  <main class="stage" id="stage">
    </main>

</div>

<div class="cmd-overlay" id="cmd-overlay">
  <div class="cmd-box">
    <input class="cmd-input" type="text" placeholder="Type a command..." id="cmd-input">
    <div class="cmd-list" id="cmd-list">
      </div>
  </div>
</div>

<script>
/**
 * LOOM CONSOLE - Single File SPA
 * Pure Vanilla JS, Zero Dependencies
 */

// --- UTILITIES ---
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const esc = (str) => (str || '').toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const timeAgo = (date) => {
  const s = Math.floor((new Date() - new Date(date)) / 1000);
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}d`;
};

// --- STATE MANAGEMENT ---
const store = {
  config: {
    baseUrl: localStorage.getItem('loom_host') || 'http://127.0.0.1:8764',
    token: localStorage.getItem('loom_token') || '',
  },
  saveConfig() {
    localStorage.setItem('loom_host', this.config.baseUrl);
    localStorage.setItem('loom_token', this.config.token);
  }
};

// --- API CLIENT ---
async function api(path, options = {}) {
  const url = `${store.config.baseUrl.replace(/\/$/, '')}${path}`;
  const headers = { 'Accept': 'application/json' };
  if (store.config.token) headers['X-Loom-Token'] = store.config.token;
  if (options.body) headers['Content-Type'] = 'application/json';

  try {
    const res = await fetch(url, { ...options, headers, body: options.body ? JSON.stringify(options.body) : null });
    const json = await res.json();
    $('#conn-status').className = 'status-dot ok';
    $('#conn-text').innerText = 'Connected';
    return json.data;
  } catch (e) {
    $('#conn-status').className = 'status-dot err';
    $('#conn-text').innerText = 'Disconnected';
    console.error(e);
    return null; // Handle gracefully in UI
  }
}

// --- VIEW RENDERERS ---

const views = {
  // 1. OVERVIEW: Dashboard widgets
  overview: async () => {
    const [health, swarm] = await Promise.all([
      api('/api/v1/health'),
      api('/api/v1/tickets/swarm')
    ]);

    return `
      <div class="p-4 anim-in" style="overflow-y: auto;">
        <h1 class="text-xl font-bold mb-4">System Overview</h1>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;">
          <div style="background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px;">
            <div class="text-xs text-muted uppercase font-bold mb-2">Environment</div>
            <div class="kv-grid">
              <span class="kv-key">Platform</span> <span class="kv-val">${health?.platform || 'Unknown'}</span>
              <span class="kv-key">Mode</span> <span class="text-blue">${health?.workspace_mode || '-'}</span>
              <span class="kv-key">Writes</span> <span class="${health?.writes_enabled ? 'text-green' : 'text-red'}">${health?.writes_enabled ? 'ON' : 'OFF'}</span>
            </div>
          </div>

          <div style="background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px;">
            <div class="text-xs text-muted uppercase font-bold mb-2">Active Agents</div>
            <div style="font-size: 32px; font-weight: 300; color: var(--accent-purple);">${swarm?.agents?.length || 0}</div>
            <div class="text-xs text-muted">Swarm claims active within 2h</div>
          </div>
        </div>

        <h2 class="text-lg font-bold mt-8 mb-4">Swarm Topology</h2>
        <div style="background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; overflow: hidden;">
          <table style="width: 100%; border-collapse: collapse;">
            <thead style="background: #1e2127; border-bottom: 1px solid var(--border);">
              <tr>
                <th style="text-align: left; padding: 10px 16px; font-size: 11px; color: var(--fg-subtle);">AGENT</th>
                <th style="text-align: left; padding: 10px 16px; font-size: 11px; color: var(--fg-subtle);">STATUS</th>
                <th style="text-align: left; padding: 10px 16px; font-size: 11px; color: var(--fg-subtle);">LAST BEAT</th>
                <th style="text-align: left; padding: 10px 16px; font-size: 11px; color: var(--fg-subtle);">CLAIMS</th>
              </tr>
            </thead>
            <tbody>
              ${(swarm?.agents || []).map(a => `
                <tr style="border-bottom: 1px solid var(--border);">
                  <td style="padding: 10px 16px;" class="mono text-blue">${a.agent}</td>
                  <td style="padding: 10px 16px;"><span class="badge ${a.active ? 'green' : 'outline'}">${a.active ? 'ACTIVE' : 'IDLE'}</span></td>
                  <td style="padding: 10px 16px;" class="text-muted text-xs">${timeAgo(a.last_heartbeat)}</td>
                  <td style="padding: 10px 16px;" class="mono">${(a.claims || []).length}</td>
                </tr>
              `).join('')}
              ${(!swarm?.agents?.length) ? '<tr><td colspan="4" class="p-4 text-center text-muted">No agents detected.</td></tr>' : ''}
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  // 2. TICKETS: Split View (Master/Detail)
  tickets: async () => {
    // Initial fetch
    const res = await api('/api/v1/tickets', { query: { limit: 100 } });
    const tickets = res?.tickets || [];

    // Helper to render detail view
    window.renderTicketDetail = async (id) => {
      const container = $('#ticket-detail');
      container.innerHTML = `<div class="p-4 text-muted">Loading ${id}...</div>`;

      // Update active state in list
      $$('.list-item').forEach(el => el.classList.remove('active'));
      $(`[data-id="${id}"]`)?.classList.add('active');

      const [data, view] = await Promise.all([
        api(`/api/v1/tickets/${id}`),
        api(`/api/v1/tickets/${id}/view`)
      ]);

      if (!data) return;
      const t = data.ticket;

      container.innerHTML = `
        <div class="p-4 anim-in">
          <div class="flex items-center justify-between mb-4">
            <h1 class="text-xl font-bold">${esc(t.title)}</h1>
            <div class="flex gap-2">
              <span class="badge outline mono">${t.id}</span>
              <span class="badge ${t.status === 'done' ? 'green' : 'blue'}">${t.status}</span>
            </div>
          </div>

          <div class="flex gap-4 mb-6 text-xs border-b border-light pb-4">
            <div><span class="text-muted">Assignee:</span> <span class="text-purple">${t.assignee || 'Unassigned'}</span></div>
            <div><span class="text-muted">Priority:</span> ${t.priority}</div>
            <div><span class="text-muted">Type:</span> ${t.type}</div>
          </div>

          <div class="markdown-body" style="font-size: 13px; line-height: 1.6; color: #d7dae0; max-width: 800px;">
            ${esc(data.body).replace(/\n/g, '<br>')}
          </div>

          <div class="mt-8">
            <h3 class="text-sm font-bold text-muted uppercase mb-2">Dependencies</h3>
            <div class="flex gap-2">
              ${(t.deps || []).map(d => `<span class="badge outline mono">${d}</span>`).join('') || '<span class="text-muted text-xs">None</span>'}
            </div>
          </div>
        </div>
      `;
    };

    return `
      <div class="split-view anim-in">
        <div class="split-master">
          <div class="p-2 border-b border-light">
            <input class="input" placeholder="Filter tickets..." onkeyup="filterList(this.value)">
          </div>
          <div class="overflow-auto flex-col" id="ticket-list">
            ${tickets.map(t => `
              <div class="list-item" data-id="${t.id}" onclick="renderTicketDetail('${t.id}')">
                <div class="list-title text-sm">${esc(t.title)}</div>
                <div class="list-meta">
                  <span class="mono text-xs ${t.status==='done'?'text-green':'text-blue'}">${t.status}</span>
                  <span class="mono text-xs">${t.id}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="split-detail" id="ticket-detail">
          <div class="flex items-center justify-center h-full text-muted">
            Select a ticket to view details
          </div>
        </div>
      </div>
    `;
  },

  // 3. TEAMS: Similar Split View
  teams: async () => {
    const res = await api('/api/v1/teams');
    const teams = res?.teams || [];

    window.renderTeamDetail = async (name) => {
      const container = $('#team-detail');
      container.innerHTML = `<div class="p-4 text-muted">Loading logs...</div>`;

      $$('.list-item').forEach(el => el.classList.remove('active'));
      $(`[data-id="${name}"]`)?.classList.add('active');

      const [status, run] = await Promise.all([
        api(`/api/v1/teams/${name}/status`),
        api(`/api/v1/teams/${name}/run`)
      ]);

      container.innerHTML = `
        <div class="p-4 anim-in">
          <h1 class="text-xl font-bold mb-2 mono text-green">${name}</h1>
          <div class="text-xs text-muted mb-4">Objective: ${esc(run.objective)}</div>

          <div class="tabs mb-4">
            <div class="tab active">Status</div>
            <div class="tab">Run Config</div>
          </div>

          <div class="code-block">
            ${JSON.stringify(status, null, 2)}
          </div>
        </div>
      `;
    };

    return `
      <div class="split-view anim-in">
        <div class="split-master">
          <div class="p-2 border-b border-light text-xs text-muted font-bold uppercase pl-4">Team Executions</div>
          <div class="overflow-auto flex-col">
            ${teams.map(t => `
              <div class="list-item" data-id="${t.team}" onclick="renderTeamDetail('${t.team}')">
                <div class="list-title text-sm mono">${esc(t.team)}</div>
                <div class="list-meta">
                  <span>${timeAgo(t.updated_at)}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="split-detail" id="team-detail">
           <div class="flex items-center justify-center h-full text-muted">Select a team run</div>
        </div>
      </div>
    `;
  },

  // 4. MEMORY: Vector Search UI
  memory: async () => {
    window.runMemorySearch = async () => {
      const q = $('#mem-search').value;
      const res = await api('/api/v1/memory/recall', { query: { q, limit: 10 } });

      const results = $('#mem-results');
      if (!res?.items?.length) {
        results.innerHTML = `<div class="p-4 text-muted text-center">No meaningful results found.</div>`;
        return;
      }

      results.innerHTML = res.items.map(i => `
        <div class="p-4 border-b border-light hover:bg-active cursor-pointer">
          <div class="flex justify-between">
            <div class="text-blue font-bold text-sm">${esc(i.title)}</div>
            <div class="mono text-xs text-muted">${(i.score?.final || 0).toFixed(2)}</div>
          </div>
          <div class="text-xs text-muted mt-1 line-clamp-2">${esc(i.preview)}</div>
          <div class="flex gap-2 mt-2">
            ${(i.tags || []).map(t => `<span class="badge outline">${t}</span>`).join('')}
          </div>
        </div>
      `).join('');
    };

    return `
      <div class="p-4 h-full flex flex-col anim-in">
        <div class="flex gap-2 mb-4">
          <input id="mem-search" class="input" placeholder="Query semantic memory..." style="font-size: 14px; padding: 10px;">
          <button class="btn primary" onclick="runMemorySearch()">Recall</button>
        </div>
        <div class="bg-panel border border-light rounded grow overflow-auto" id="mem-results">
          <div class="flex items-center justify-center h-full text-muted">
            Enter a query to search the knowledge graph.
          </div>
        </div>
      </div>
    `;
  },

  // 5. WORKSPACE: Tree View (Simplified)
  workspace: async () => {
    const ws = await api('/api/v1/workspace/worktrees');
    return `
      <div class="p-4 anim-in">
        <h2 class="text-lg font-bold mb-4">Workspace Inventory</h2>
        <div class="bg-panel border border-light rounded overflow-hidden">
          <table style="width: 100%; font-size: 12px;">
            <thead>
              <tr style="border-bottom: 1px solid var(--border); background: #1e2127;">
                <th class="p-2 text-left text-muted">PATH</th>
                <th class="p-2 text-left text-muted">TYPE</th>
                <th class="p-2 text-left text-muted">BRANCH</th>
                <th class="p-2 text-left text-muted">STATE</th>
              </tr>
            </thead>
            <tbody>
              ${(ws?.worktrees || []).map(w => `
                <tr style="border-bottom: 1px solid var(--border);">
                  <td class="p-2 mono text-blue">${w.path}</td>
                  <td class="p-2">${w.is_repo ? 'Git Repo' : 'Poly'}</td>
                  <td class="p-2 mono text-purple">${w.branch || 'HEAD'}</td>
                  <td class="p-2"><span class="badge ${w.dirty ? 'amber' : 'green'}">${w.dirty ? 'DIRTY' : 'CLEAN'}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  introspect: async () => {
    return `<div class="p-4 text-muted">Introspection view under construction.</div>`;
  },

  settings: async () => {
    return `
      <div class="p-8 max-w-2xl anim-in">
        <h2 class="text-lg font-bold mb-6">Connection Settings</h2>

        <div class="mb-4">
          <label class="block text-xs font-bold text-muted uppercase mb-2">Loom Server URL</label>
          <input id="set-url" class="input" value="${store.config.baseUrl}">
        </div>

        <div class="mb-6">
          <label class="block text-xs font-bold text-muted uppercase mb-2">Auth Token</label>
          <input id="set-token" class="input" type="password" value="${store.config.token}" placeholder="Optional">
        </div>

        <button class="btn primary" onclick="
          store.config.baseUrl = $('#set-url').value;
          store.config.token = $('#set-token').value;
          store.saveConfig();
          location.reload();
        ">Save & Reload</button>
      </div>
    `;
  }
};

// --- ROUTER ---
const router = {
  current: 'overview',
  async go(route) {
    this.current = route;
    // Update Sidebar
    $$('.nav-item').forEach(el => el.classList.remove('active'));
    $(`#nav-${route}`)?.classList.add('active');

    // Update Header
    $('#breadcrumbs').innerText = `Workspace / ${route.charAt(0).toUpperCase() + route.slice(1)}`;

    // Render View
    const stage = $('#stage');
    stage.innerHTML = `<div class="flex items-center justify-center h-full text-muted">Loading...</div>`;

    if (views[route]) {
      const html = await views[route]();
      stage.innerHTML = html;
    } else {
      stage.innerHTML = `<div class="p-4">View not found</div>`;
    }
  }
};

// --- COMMAND PALETTE ---
const palette = {
  toggle() {
    const el = $('#cmd-overlay');
    const input = $('#cmd-input');
    if (el.classList.contains('open')) {
      el.classList.remove('open');
    } else {
      el.classList.add('open');
      input.value = '';
      input.focus();
      this.render();
    }
  },

  commands: [
    { label: 'Go to Overview', action: () => router.go('overview') },
    { label: 'Go to Tickets', action: () => router.go('tickets') },
    { label: 'Go to Teams', action: () => router.go('teams') },
    { label: 'Go to Memory', action: () => router.go('memory') },
    { label: 'Reload Window', action: () => location.reload() },
    { label: 'Create New Ticket', action: () => alert('Mock: Ticket Dialog') },
  ],

  render() {
    const list = $('#cmd-list');
    const q = $('#cmd-input').value.toLowerCase();

    const matches = this.commands.filter(c => c.label.toLowerCase().includes(q));

    list.innerHTML = matches.map((c, i) => `
      <div class="cmd-item ${i === 0 ? 'selected' : ''}" onclick="palette.exec(${i})">
        <span>${c.label}</span>
        <span class="badge outline">Jump</span>
      </div>
    `).join('');

    // Attach click handlers via closure index looks easier in innerHTML above but lets map click
    $$('.cmd-item').forEach((el, i) => {
      el.onclick = () => {
        matches[i].action();
        palette.toggle();
      };
    });
  },

  exec(index) {
    // Basic logic for enter key execution could go here
  }
};

// --- INIT & EVENT LISTENERS ---

// Keyboard Shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    palette.toggle();
  }
  if (e.key === 'Escape') {
    $('#cmd-overlay').classList.remove('open');
  }
});

// Filter lists
window.filterList = (val) => {
  const v = val.toLowerCase();
  $$('.list-item').forEach(el => {
    el.style.display = el.innerText.toLowerCase().includes(v) ? 'flex' : 'none';
  });
};

// Global Actions
window.actions = {
  refresh: () => router.go(router.current),
  newTicket: () => alert('Dialogs coming in v2.1')
};

// Palette Input Listener
$('#cmd-input').addEventListener('input', () => palette.render());

// Start App
router.go('overview');

</script>
</body>
</html>
