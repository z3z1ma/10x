version: 3
metadata:
  labels:
    - b
    - a
  purpose: team roster schema test
  name: YAML Sprint Foundations
mounts:
  - .venv
communication:
  routes:
    - from_role: reviewer
      to:
        - manager
        - role:architect
  broadcast_groups:
    reviewers:
      - role:architect
      - member:ux
      - member:designer
members:
  - role: reviewer
    id: ux
    agent: loom-team-worker
    always_on: false
    harness: codex
  - id: designer
    role: designer
    always_on: true
    harness: codex
    agent: loom-team-worker
    workspace: worktree
builtins:
  integrator:
    model: sonnet
    agent: loom-team-integrator
    harness: claude
  worker:
    agent: loom-team-worker
    harness: codex
    model: gpt-5-codex
  manager:
    harness: opencode
    agent: loom-team-manager
  architect:
    harness: opencode
    agent: loom-team-architect
