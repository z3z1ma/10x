version: 3
metadata:
  labels:
    - core
  purpose: Primary development team
  name: MiyagoDo
mounts:
  - .venv
communication:
  routes:
    - from_role: reviewer
      to:
        - manager
        - role:architect
  broadcast_groups:
    reviewers:
      - role:architect
      - member:ux
      - member:designer
members:
  - id: ux
    role: reviewer
    harness: codex
    agent: loom-team-worker
    model: gpt-5.3-codex
    always_on: false
  - id: designer
    role: designer
    harness: codex
    agent: loom-team-worker
    model: gpt-5.3-codex
    always_on: true
builtins:
  integrator:
    agent: loom-team-integrator
    harness: codex
    model: gpt-5.3-codex
  worker:
    agent: loom-team-worker
    harness: codex
    model: gpt-5.3-codex
  manager:
    agent: loom-team-manager
    harness: codex
    model: gpt-5.3-codex-spark
  architect:
    harness: omp
    agent: loom-team-architect
    model: openai-codex/gpt-5.3-codex
